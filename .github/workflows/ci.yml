name: InterviewIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # Frontend Build
  # ─────────────────────────────────────────────────────────
  client:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist

  # ─────────────────────────────────────────────────────────
  # Backend Check
  # ─────────────────────────────────────────────────────────
  server:
    name: Backend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Syntax Check
        run: |
          node --check app.js
          node --check server.js

      - name: Import Check
        run: |
          node -e "require('./app')"

  # ─────────────────────────────────────────────────────────
  # Python AI Check
  # ─────────────────────────────────────────────────────────
  python:
    name: Python AI Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax Check
        run: |
          python -m py_compile main.py
          python -m py_compile routers/nlp.py
          python -m py_compile routers/resume.py
          python -m py_compile routers/analysis.py
          python -m py_compile routers/interview.py
          python -m py_compile routers/vision.py
          python -m py_compile routers/voice.py

      - name: Import Check
        run: |
          python -c "from main import app; print('FastAPI app OK')"

  # ─────────────────────────────────────────────────────────
  # Docker Build
  # ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    needs:
      - client
      - server
      - python

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Server Image
        run: |
          docker build \
            -f docker/Dockerfile.server \
            -t interviewiq-server:${{ github.sha }} \
            ./server

      - name: Build Python Image
        run: |
          docker build \
            -f docker/Dockerfile.python \
            -t interviewiq-python:${{ github.sha }} \
            ./python-ai