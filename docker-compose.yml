version: "3.9"

services:
  # ─── Node.js Backend ─────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: interviewiq-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PYTHON_AI_URL: http://python-ai:8000
    depends_on:
      python-ai:
        condition: service_started
    volumes:
      - ./server/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Python AI Backend ───────────────────────────────────
  python-ai:
    build:
      context: ./python-ai
      dockerfile: ../docker/Dockerfile.python
    container_name: interviewiq-python-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PYTHON_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend (Nginx) ──────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: "InterviewIQ AI"
    container_name: interviewiq-client
    restart: unless-stopped
    depends_on:
      - server

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: interviewiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s

networks:
  default:
    name: interviewiq-network
