worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 15M;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Upstreams
  upstream backend   { server server:5000;    keepalive 32; }
  upstream frontend  { server client:80;      keepalive 16; }
  upstream python_ai { server python-ai:8000; keepalive 16; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options nosniff;

    # React SPA
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # Node.js REST API
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout    120s;
      proxy_connect_timeout 15s;
    }

    # Python AI Backend
    location /py/ {
      rewrite ^/py/(.*)$ /$1 break;
      proxy_pass http://python_ai;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;
    }

    # Socket.io
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_read_timeout 3600s;
    }

    # Python AI FastAPI docs
    location /py-docs {
      rewrite ^/py-docs(.*)$ $1 break;
      proxy_pass http://python_ai;
    }
  }
}
